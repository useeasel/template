# Netlify build + deploy config for the Gesso portfolio template.

[build]
  # Install dependencies in the build command, then run via npm (which puts
  # node_modules/.bin on PATH). A bare `astro build` fails with `astro: command
  # not found` when Netlify's automatic dependency-install step doesn't run —
  # e.g. on sites the Gesso provisioner creates through the Netlify API. Keep this
  # in sync with the `cmd` in usegesso/web → workers/provision/src/netlify.ts.
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  # Pin Node to keep builds reproducible across artist sites.
  NODE_VERSION = "20"

# Build caching note:
# Netlify caches `node_modules` automatically between builds. To also cache
# Astro's image-optimization output (and protect free build minutes), keep the
# `node_modules/.astro` and `.astro` directories out of .gitignore-driven
# cleanup. The official `netlify-plugin-cache` can extend this if needed:
#   [[plugins]]
#     package = "netlify-plugin-cache"
#     [plugins.inputs]
#       paths = ["node_modules/.astro", ".astro"]

# Netlify Forms note:
# The contact form in src/pages/contact.astro is a plain HTML <form> with the
# `data-netlify="true"` attribute and a hidden `form-name` input. Netlify's
# post-processing bot detects it in the built HTML and wires up submissions
# automatically — no extra config required here. A honeypot field
# (`netlify-honeypot="bot-field"`) guards against spam.

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# The build stamp must never be cached, so the auto-refresh check (see Base.astro)
# always sees the freshly deployed value. (The client also fetches it with
# `cache: 'no-store'`, which is what protects GitHub Pages, where headers can't be set.)
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
